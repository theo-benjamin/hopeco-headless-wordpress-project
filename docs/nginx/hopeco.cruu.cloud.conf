map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream hopeco_next {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream hopeco_wordpress {
    server 127.0.0.1:8085;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name hopeco.cruu.cloud www.hopeco.cruu.cloud;

    return 301 https://hopeco.cruu.cloud$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.hopeco.cruu.cloud;

    ssl_certificate /etc/letsencrypt/live/hopeco.cruu.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hopeco.cruu.cloud/privkey.pem;

    return 301 https://hopeco.cruu.cloud$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hopeco.cruu.cloud;

    ssl_certificate /etc/letsencrypt/live/hopeco.cruu.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hopeco.cruu.cloud/privkey.pem;

    access_log /var/log/nginx/hopeco.cruu.cloud.access.log;
    error_log /var/log/nginx/hopeco.cruu.cloud.error.log;

    client_max_body_size 32m;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_http_version 1.1;

    location = /wp-login.php {
        proxy_pass http://hopeco_wordpress;
    }

    location = /xmlrpc.php {
        proxy_pass http://hopeco_wordpress;
    }

    location = /graphql {
        proxy_pass http://hopeco_wordpress;
    }

    location ^~ /wp-admin/ {
        proxy_pass http://hopeco_wordpress;
    }

    location ^~ /wp-json/ {
        proxy_pass http://hopeco_wordpress;
    }

    location ^~ /wp-content/ {
        proxy_pass http://hopeco_wordpress;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ^~ /wp-includes/ {
        proxy_pass http://hopeco_wordpress;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location ^~ /_next/ {
        proxy_pass http://hopeco_next;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        proxy_pass http://hopeco_next;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
