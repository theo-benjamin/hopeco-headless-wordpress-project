services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env.wordpress
    environment:
      MYSQL_DATABASE: ${WORDPRESS_DB_NAME}
      MYSQL_USER: ${WORDPRESS_DB_USER}
      MYSQL_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${WORDPRESS_DB_ROOT_PASSWORD}
    ports:
      - "${MYSQL_HOST_BIND:-127.0.0.1}:${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  wordpress:
    image: wordpress:php8.3-apache
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.wordpress
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      WORDPRESS_CONFIG_EXTRA: |
        if (
            isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) &&
            strpos($$_SERVER['HTTP_X_FORWARDED_PROTO'], 'https') !== false
        ) {
            $$_SERVER['HTTPS'] = 'on';
        }
    ports:
      - "${WORDPRESS_HOST_BIND:-127.0.0.1}:${WORDPRESS_HOST_PORT:-8080}:80"
    volumes:
      - wordpress_data:/var/www/html
      - ./wordpress/wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins

  wpcli:
    image: wordpress:cli-php8.3
    depends_on:
      wordpress:
        condition: service_started
    env_file:
      - .env.wordpress
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}
      HOME: /tmp/wpcli
      WP_CLI_CACHE_DIR: /tmp/wpcli/cache
    working_dir: /var/www/html
    user: "33:33"
    volumes:
      - wordpress_data:/var/www/html
      - ./wordpress/wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./scripts:/scripts
    entrypoint: ["bash", "-lc"]
    command: ["sleep infinity"]

volumes:
  mysql_data:
  wordpress_data:
